services:
  eidos-db:
    image: postgres:15-alpine
    labels:
      - "com.docker.compose.project=${STACK_NAME:-eidos}"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/eidos_postgres_password
      - POSTGRES_DB=eidos
    secrets:
      - eidos_postgres_password
    volumes:
      - ${EIDOS_DB_MOUNT_PATH:-./db-data}:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - aether-net

  eidos-mcp:
    image: ${REGISTRY_PREFIX}eidos-mcp:${STACK_NAME:-latest}
    build: 
      context: .
      dockerfile: services/mcp/Dockerfile
    labels:
      - "com.docker.compose.project=${STACK_NAME:-eidos}"
    ports:
      - "3300:3000"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    environment:
      - PORT=3000
      - POSTGRES_USER=postgres
      - POSTGRES_DB=eidos
      - TZ=Pacific/Auckland
    secrets:
      - eidos_postgres_password
    networks:
      - aether-net
    depends_on:
      - eidos-db

  eidos-graphql:
    image: ${REGISTRY_PREFIX}eidos-graphql:${STACK_NAME:-latest}
    build:
      context: .
      dockerfile: services/graphql/Dockerfile
    labels:
      - "com.docker.compose.project=${STACK_NAME:-eidos}"
    ports:
      - "3400:4000"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    environment:
      - PORT=4000
      - POSTGRES_USER=postgres
      - POSTGRES_DB=eidos
      - TZ=Pacific/Auckland
    secrets:
      - eidos_postgres_password
    networks:
      - aether-net
    depends_on:
      - eidos-mcp
      - eidos-db

  eidos-backup:
    image: alpine:latest
    labels:
      - "com.docker.compose.project=${STACK_NAME:-eidos}"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    volumes:
      - /mnt/storage/backups/eidos:/backups
    networks:
      - aether-net
    secrets:
      - eidos_postgres_password
    entrypoint: /bin/sh
    # Job runs at 02:00 AM, using pg_dump to backup the PostgreSQL DB before charon-archive pushes at 03:00 AM
    command: -c "
      apk add --no-cache postgresql-client;
      mkdir -p /backups;
      echo '0 2 * * * PGPASSWORD=$$(cat /run/secrets/eidos_postgres_password) pg_dump -h eidos-db -U postgres eidos -F c -f /backups/eidos_backup.dump >> /var/log/cron.log 2>&1' > /etc/crontabs/root;
      echo 'Starting eidos-backup crond...';
      crond -f -d 8"

networks:
  aether-net:
    external: true

secrets:
  eidos_postgres_password:
    external: true
    name: ${EIDOS_POSTGRES_PASSWORD_NAME}
